name: platform-deploy

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - home
          - card
          - stocks
          - vendors
          - admin-system
          - admin-vendors
      commit_sha:
        description: "App commit SHA to deploy"
        required: true
        type: string
      target_env:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: platform-deploy-${{ inputs.target_env }}
  cancel-in-progress: false

env:
  APP_ID: ${{ inputs.app_id }}
  GCS_PATH: ${{ inputs.app_id }}/versions/${{ inputs.commit_sha }}
  ALL_APP_IDS: "home card stocks vendors admin-system admin-vendors"

jobs:
  download-and-verify:
    name: Download and verify artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download artifacts from GCS
        run: |
          mkdir -p artifacts
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ env.GCS_PATH }}/manifest.json" artifacts/
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ env.GCS_PATH }}/runtime.tar.gz" artifacts/
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ env.GCS_PATH }}/checksums.txt" artifacts/

      - name: Validate manifest
        run: |
          echo "--- manifest.json ---"
          cat artifacts/manifest.json
          echo ""

          MANIFEST_APP_ID=$(jq -r '.app_id' artifacts/manifest.json)
          CONTRACT_VERSION=$(jq -r '.compatibility.platform_contract_version' artifacts/manifest.json)
          MANIFEST_SHA=$(jq -r '.commit_sha' artifacts/manifest.json)

          if [ "$MANIFEST_APP_ID" != "${{ env.APP_ID }}" ]; then
            echo "ERROR: manifest app_id '$MANIFEST_APP_ID' does not match expected '${{ env.APP_ID }}'"
            exit 1
          fi

          if [ "$CONTRACT_VERSION" != "v1" ]; then
            echo "ERROR: unsupported contract version '$CONTRACT_VERSION'"
            exit 1
          fi

          if [ "$MANIFEST_SHA" != "${{ inputs.commit_sha }}" ]; then
            echo "ERROR: manifest commit_sha '$MANIFEST_SHA' does not match requested '${{ inputs.commit_sha }}'"
            exit 1
          fi

          echo "Manifest validation passed."

      - name: Verify checksums
        working-directory: artifacts
        run: |
          echo "--- checksums.txt ---"
          cat checksums.txt
          echo ""

          echo "Verifying runtime.tar.gz checksum..."
          grep "runtime.tar.gz" checksums.txt | sha256sum -c -
          echo "Checksum verification passed."

      - name: Inspect tarball contents
        run: |
          echo "--- runtime.tar.gz contents ---"
          tar -tzf artifacts/runtime.tar.gz | head -20

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verified-artifacts
          path: artifacts/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: download-and-verify
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download verified artifacts
        uses: actions/download-artifact@v4
        with:
          name: verified-artifacts
          path: artifacts/

      - name: Extract app runtime
        run: |
          tar -xzf artifacts/runtime.tar.gz -C hosting/public

          # Map app_id to its hosting directory path
          hosting_dir="${{ inputs.app_id }}"
          case "${{ inputs.app_id }}" in
            home)         hosting_dir="" ;;
            admin-system)  hosting_dir="admin/system" ;;
            admin-vendors) hosting_dir="admin/vendors" ;;
          esac

          if [ -z "$hosting_dir" ]; then
            echo "--- hosting/public/ (home extracts at root) ---"
            ls -la hosting/public/
          else
            echo "--- hosting/public/${hosting_dir}/ contents ---"
            ls -la "hosting/public/${hosting_dir}/"
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore other apps from latest deployed artifacts
        run: |
          for app in ${{ env.ALL_APP_IDS }}; do
            if [ "$app" = "${{ inputs.app_id }}" ]; then
              echo "Skipping $app (being deployed now)"
              continue
            fi

            echo "Checking for latest-deployed marker for $app..."
            MARKER="gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${app}/latest-deployed.json"
            if gsutil -q stat "$MARKER" 2>/dev/null; then
              SHA=$(gsutil cat "$MARKER" | jq -r '.commit_sha')
              echo "Restoring $app at commit $SHA"
              gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${app}/versions/${SHA}/runtime.tar.gz" "/tmp/${app}-runtime.tar.gz"
              tar -xzf "/tmp/${app}-runtime.tar.gz" -C hosting/public

              # Map app_id to hosting directory path
              hdir="$app"
              case "$app" in
                home)         hdir="" ;;
                admin-system)  hdir="admin/system" ;;
                admin-vendors) hdir="admin/vendors" ;;
              esac

              if [ -z "$hdir" ]; then
                echo "Restored home app (root-level files in hosting/public/)"
              else
                echo "Restored hosting/public/${hdir}/"
                ls -la "hosting/public/${hdir}/"
              fi
            else
              echo "No deployed marker found for $app, skipping"
            fi
          done

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project haderach-ai

      - name: Write latest-deployed marker to GCS
        run: |
          echo '{"commit_sha":"${{ inputs.commit_sha }}","deployed_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' \
            | gsutil cp - "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ inputs.app_id }}/latest-deployed.json"
          echo "Wrote latest-deployed marker for ${{ inputs.app_id }}"

      - name: Log deployment summary
        run: |
          echo "============================================"
          echo "Deployment complete"
          echo "  App:         ${{ env.APP_ID }}"
          echo "  Commit SHA:  ${{ inputs.commit_sha }}"
          echo "  Environment: ${{ inputs.target_env }}"
          echo "  Version:     $(jq -r '.version' artifacts/manifest.json)"
          echo "============================================"
