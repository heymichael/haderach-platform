name: platform-deploy

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - home
          - expenses
          - stocks
          - vendors
          - admin-system
          - admin-vendors
          - site
      use_latest_artifact:
        description: "Use latest main artifact automatically"
        required: false
        type: boolean
        default: true
      commit_sha:
        description: "Manual app commit SHA (used only when 'use_latest_artifact' is false)"
        required: false
        type: string
      target_env:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: platform-deploy-${{ inputs.target_env }}
  cancel-in-progress: false

env:
  APP_ID: ${{ inputs.app_id }}
  ALL_APP_IDS: "home expenses stocks vendors admin-system admin-vendors site"

jobs:
  resolve:
    name: Resolve deploy SHA
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      resolved_sha: ${{ steps.resolve.outputs.resolved_sha }}
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          USE_LATEST: ${{ inputs.use_latest_artifact }}
          APP_ID: ${{ inputs.app_id }}
          MANUAL_SHA: ${{ inputs.commit_sha }}
          BUCKET: ${{ vars.GCS_ARTIFACT_BUCKET }}
        run: |
          declare -A APP_REPOS=([home]=haderach-home [expenses]=expenses [stocks]=stocks [vendors]=vendors [admin-system]=system-admin [admin-vendors]=admin-vendors [site]=site)

          if [[ "$USE_LATEST" == "true" ]]; then
            repo="${APP_REPOS[$APP_ID]}"
            if [[ -z "$repo" ]]; then
              echo "ERROR: unknown app_id '$APP_ID'"
              exit 1
            fi
            if [[ -z "$GH_TOKEN" ]]; then
              echo "ERROR: use_latest_artifact requires CROSS_REPO_PAT secret"
              exit 1
            fi
            sha=$(gh api "repos/heymichael/${repo}/commits/main" --jq '.sha' 2>/dev/null || echo "")
            if [[ -z "$sha" ]]; then
              echo "ERROR: could not resolve latest main SHA for $APP_ID ($repo)"
              exit 1
            fi
            echo "Resolved latest main SHA for $APP_ID: $sha"
          else
            sha="$MANUAL_SHA"
            if [[ -z "$sha" ]]; then
              echo "No manual commit_sha provided and use_latest_artifact=false; skipping deploy."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "resolved_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Using manual SHA for $APP_ID: $sha"
          fi

          if ! gsutil -q stat "gs://${BUCKET}/${APP_ID}/versions/${sha}/manifest.json" 2>/dev/null; then
            echo "ERROR: artifact not found for $APP_ID at $sha"
            exit 1
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "resolved_sha=$sha" >> "$GITHUB_OUTPUT"

  download-and-verify:
    name: Download and verify artifacts
    needs: resolve
    if: needs.resolve.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download artifacts from GCS
        env:
          RESOLVED_SHA: ${{ needs.resolve.outputs.resolved_sha }}
        run: |
          mkdir -p artifacts
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ inputs.app_id }}/versions/${RESOLVED_SHA}/manifest.json" artifacts/
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ inputs.app_id }}/versions/${RESOLVED_SHA}/runtime.tar.gz" artifacts/
          gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ inputs.app_id }}/versions/${RESOLVED_SHA}/checksums.txt" artifacts/

      - name: Validate manifest
        env:
          RESOLVED_SHA: ${{ needs.resolve.outputs.resolved_sha }}
        run: |
          echo "--- manifest.json ---"
          cat artifacts/manifest.json
          echo ""

          MANIFEST_APP_ID=$(jq -r '.app_id' artifacts/manifest.json)
          CONTRACT_VERSION=$(jq -r '.compatibility.platform_contract_version' artifacts/manifest.json)
          MANIFEST_SHA=$(jq -r '.commit_sha' artifacts/manifest.json)

          if [ "$MANIFEST_APP_ID" != "${{ env.APP_ID }}" ]; then
            echo "ERROR: manifest app_id '$MANIFEST_APP_ID' does not match expected '${{ env.APP_ID }}'"
            exit 1
          fi

          if [ "$CONTRACT_VERSION" != "v1" ]; then
            echo "ERROR: unsupported contract version '$CONTRACT_VERSION'"
            exit 1
          fi

          if [ "$MANIFEST_SHA" != "$RESOLVED_SHA" ]; then
            echo "ERROR: manifest commit_sha '$MANIFEST_SHA' does not match requested '$RESOLVED_SHA'"
            exit 1
          fi

          echo "Manifest validation passed."

      - name: Verify checksums
        working-directory: artifacts
        run: |
          echo "--- checksums.txt ---"
          cat checksums.txt
          echo ""

          echo "Verifying runtime.tar.gz checksum..."
          grep "runtime.tar.gz" checksums.txt | sha256sum -c -
          echo "Checksum verification passed."

      - name: Inspect tarball contents
        run: |
          echo "--- runtime.tar.gz contents ---"
          tar -tzf artifacts/runtime.tar.gz | head -20

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verified-artifacts
          path: artifacts/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: [resolve, download-and-verify]
    if: needs.resolve.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download verified artifacts
        uses: actions/download-artifact@v4
        with:
          name: verified-artifacts
          path: artifacts/

      - name: Extract app runtime
        run: |
          tar -xzf artifacts/runtime.tar.gz -C hosting/public

          # Map app_id to its hosting directory path
          hosting_dir="${{ inputs.app_id }}"
          case "${{ inputs.app_id }}" in
            home)         hosting_dir="" ;;
            admin-system)  hosting_dir="admin/system" ;;
            admin-vendors) hosting_dir="admin/vendors" ;;
          esac

          if [ -z "$hosting_dir" ]; then
            echo "--- hosting/public/ (home extracts at root) ---"
            ls -la hosting/public/
          else
            echo "--- hosting/public/${hosting_dir}/ contents ---"
            ls -la "hosting/public/${hosting_dir}/"
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore other apps from latest deployed artifacts
        run: |
          for app in ${{ env.ALL_APP_IDS }}; do
            if [ "$app" = "${{ inputs.app_id }}" ]; then
              echo "Skipping $app (being deployed now)"
              continue
            fi

            echo "Checking for latest-deployed marker for $app..."
            MARKER="gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${app}/latest-deployed.json"
            if gsutil -q stat "$MARKER" 2>/dev/null; then
              SHA=$(gsutil cat "$MARKER" | jq -r '.commit_sha')
              echo "Restoring $app at commit $SHA"
              gsutil cp "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${app}/versions/${SHA}/runtime.tar.gz" "/tmp/${app}-runtime.tar.gz"
              tar -xzf "/tmp/${app}-runtime.tar.gz" -C hosting/public

              # Map app_id to hosting directory path
              hdir="$app"
              case "$app" in
                home)         hdir="" ;;
                admin-system)  hdir="admin/system" ;;
                admin-vendors) hdir="admin/vendors" ;;
              esac

              if [ -z "$hdir" ]; then
                echo "Restored home app (root-level files in hosting/public/)"
              else
                echo "Restored hosting/public/${hdir}/"
                ls -la "hosting/public/${hdir}/"
              fi
            else
              echo "No deployed marker found for $app, skipping"
            fi
          done

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project haderach-ai

      - name: Write latest-deployed marker to GCS
        env:
          RESOLVED_SHA: ${{ needs.resolve.outputs.resolved_sha }}
        run: |
          echo '{"commit_sha":"'"${RESOLVED_SHA}"'","deployed_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' \
            | gsutil cp - "gs://${{ vars.GCS_ARTIFACT_BUCKET }}/${{ inputs.app_id }}/latest-deployed.json"
          echo "Wrote latest-deployed marker for ${{ inputs.app_id }}"

      - name: Log deployment summary
        env:
          RESOLVED_SHA: ${{ needs.resolve.outputs.resolved_sha }}
        run: |
          echo "============================================"
          echo "Deployment complete"
          echo "  App:         ${{ env.APP_ID }}"
          echo "  Commit SHA:  ${RESOLVED_SHA}"
          echo "  Environment: ${{ inputs.target_env }}"
          echo "  Version:     $(jq -r '.version' artifacts/manifest.json)"
          echo "============================================"

  skip:
    name: Skip deploy (no manual SHA provided)
    needs: resolve
    if: needs.resolve.outputs.should_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: |
          echo "Deployment skipped."
          echo "Reason: use_latest_artifact=false and commit_sha was empty."
