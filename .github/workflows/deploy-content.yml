name: deploy-content

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: content-deploy-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync content to GCS
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target_env }}
    steps:
      - name: Checkout haderach-content
        uses: actions/checkout@v4
        with:
          repository: heymichael/haderach-content
          path: content

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync content files to GCS bucket
        run: gsutil -m rsync -r -d -x '^components/' content/public/ gs://${{ vars.CONTENT_BUCKET }}/

      - name: Log deployment summary
        run: |
          CONTENT_SHA=$(cd content && git rev-parse --short HEAD)
          echo "============================================"
          echo "Content deployment complete"
          echo "  Content SHA: $CONTENT_SHA"
          echo "  Environment: ${{ inputs.target_env }}"
          echo "  Bucket:      ${{ vars.CONTENT_BUCKET }}"
          echo "============================================"
