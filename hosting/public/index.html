<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>haderach.ai platform</title>
    <meta
      name="description"
      content="Haderach platform control plane and routing host."
    />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #0b0f1a;
        color: rgba(255, 255, 255, 0.85);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        width: 100%;
        padding-top: 2rem;
      }

      .logo {
        width: min(70vw, 760px);
        height: auto;
      }

      nav {
        margin-bottom: 0;
        display: flex;
        gap: 2rem;
      }

      nav a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 1.1rem;
        letter-spacing: 0.08em;
        padding: 0.6rem 1.4rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        transition: color 0.2s, border-color 0.2s;
      }

      nav a:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.5);
      }

      .auth-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem;
      }

      .auth-section p {
        margin: 0;
        text-align: center;
        line-height: 1.5;
      }

      .user-info {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
      }

      button {
        color: rgba(255, 255, 255, 0.85);
        background: transparent;
        font-size: 1rem;
        letter-spacing: 0.06em;
        padding: 0.6rem 1.6rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 6px;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s, background 0.2s;
      }

      button:hover:not(:disabled) {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.05);
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .error-text {
        color: #e57373;
        font-size: 0.9rem;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main aria-label="Haderach landing">
      <!-- Loading state -->
      <div id="state-loading" class="auth-section">
        <p>Loading&hellip;</p>
      </div>

      <!-- Signed-out state -->
      <div id="state-signed-out" class="auth-section hidden">
        <p>Sign in with your Google account to continue.</p>
        <button id="btn-sign-in">Sign in with Google</button>
        <p id="auth-error" class="error-text hidden"></p>
      </div>

      <!-- Authorized state: show accessible apps -->
      <div id="state-authorized" class="auth-section hidden">
        <nav id="app-nav" aria-label="App navigation"></nav>
        <p class="user-info">
          Signed in as <strong id="user-email"></strong>
        </p>
        <button id="btn-sign-out-authorized">Sign out</button>
      </div>

      <!-- No access state -->
      <div id="state-no-access" class="auth-section hidden">
        <p>
          You are signed in as
          <strong id="user-email-no-access"></strong>, but your account does not
          have access to any applications.
        </p>
        <p>Please contact your administrator to be granted access.</p>
        <button id="btn-sign-out-no-access">Sign out</button>
      </div>

      <div style="flex: 1"></div>
      <img class="logo" src="/assets/landing/logo.svg" alt="Haderach" />
      <div style="flex: 2"></div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signInWithPopup,
        signOut,
        GoogleAuthProvider,
        browserLocalPersistence,
        setPersistence,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const APP_CATALOG = [
        { id: "card", label: "Card", path: "/card/" },
        { id: "stocks", label: "Stocks", path: "/stocks/" },
      ];

      const APP_GRANTING_ROLES = {
        card: ["admin", "member", "card_member"],
        stocks: ["admin", "member", "stocks_member"],
      };

      function hasAppAccess(userRoles, appId) {
        const grantingRoles = APP_GRANTING_ROLES[appId] || [];
        return userRoles.some((r) => grantingRoles.includes(r));
      }

      function getAccessibleApps(userRoles) {
        return APP_CATALOG.filter((app) => hasAppAccess(userRoles, app.id));
      }

      function normalizeEmail(email) {
        return email.trim().toLowerCase();
      }

      function getReturnTo() {
        const params = new URLSearchParams(window.location.search);
        const raw = params.get("returnTo");
        if (!raw) return null;
        if (!raw.startsWith("/")) return null;
        return raw;
      }

      function returnToAppId(returnTo) {
        for (const app of APP_CATALOG) {
          if (returnTo.startsWith(app.path)) return app.id;
        }
        return null;
      }

      // DOM refs
      const $loading = document.getElementById("state-loading");
      const $signedOut = document.getElementById("state-signed-out");
      const $authorized = document.getElementById("state-authorized");
      const $noAccess = document.getElementById("state-no-access");
      const $authError = document.getElementById("auth-error");
      const $appNav = document.getElementById("app-nav");
      const $userEmail = document.getElementById("user-email");
      const $userEmailNoAccess = document.getElementById(
        "user-email-no-access"
      );

      function showState(id) {
        [$loading, $signedOut, $authorized, $noAccess].forEach((el) =>
          el.classList.add("hidden")
        );
        document.getElementById(id).classList.remove("hidden");
      }

      async function fetchFirebaseConfig() {
        const resp = await fetch("/__/firebase/init.json");
        if (!resp.ok) throw new Error("Failed to load Firebase config");
        return resp.json();
      }

      async function fetchUserRoles(db, email) {
        try {
          const snap = await getDoc(
            doc(db, "users", normalizeEmail(email))
          );
          if (!snap.exists()) return [];
          const data = snap.data();
          return Array.isArray(data.roles) ? data.roles : [];
        } catch {
          return [];
        }
      }

      async function boot() {
        let firebaseConfig;
        try {
          firebaseConfig = await fetchFirebaseConfig();
        } catch {
          $authError.textContent =
            "Platform configuration unavailable. Please try again later.";
          $authError.classList.remove("hidden");
          showState("state-signed-out");
          document.getElementById("btn-sign-in").disabled = true;
          return;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        await setPersistence(auth, browserLocalPersistence).catch(() => {});

        function renderAppNav(accessibleApps) {
          $appNav.innerHTML = "";
          for (const app of accessibleApps) {
            const a = document.createElement("a");
            a.href = app.path;
            a.textContent = app.label;
            $appNav.appendChild(a);
          }
        }

        onAuthStateChanged(auth, async (user) => {
          if (!user) {
            showState("state-signed-out");
            return;
          }

          showState("state-loading");
          const roles = await fetchUserRoles(db, user.email);
          const accessible = getAccessibleApps(roles);

          if (accessible.length === 0) {
            $userEmailNoAccess.textContent = user.email;
            showState("state-no-access");
            return;
          }

          const returnTo = getReturnTo();
          if (returnTo) {
            const targetAppId = returnToAppId(returnTo);
            if (targetAppId && hasAppAccess(roles, targetAppId)) {
              window.location.replace(returnTo);
              return;
            }
          }

          $userEmail.textContent = user.email;
          renderAppNav(accessible);
          showState("state-authorized");
        });

        document
          .getElementById("btn-sign-in")
          .addEventListener("click", async () => {
            $authError.classList.add("hidden");
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: "select_account" });
            try {
              await signInWithPopup(auth, provider);
            } catch (err) {
              $authError.textContent = err.message || "Sign-in failed.";
              $authError.classList.remove("hidden");
            }
          });

        const handleSignOut = () => signOut(auth);
        document
          .getElementById("btn-sign-out-authorized")
          .addEventListener("click", handleSignOut);
        document
          .getElementById("btn-sign-out-no-access")
          .addEventListener("click", handleSignOut);
      }

      boot();
    </script>
  </body>
</html>
